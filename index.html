<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mutu - Puskesmas Cilincing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7fa; padding: 25px; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .header-title { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 25px; }
        .filter-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #dee2e6; }
        .table thead { background-color: #f8f9fa; }
        .fw-bold-blue { color: #1e3c72; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title shadow">
        <h3 class="mb-0">📊 DASHBOARD PEMANTAUAN INDIKATOR MUTU</h3>
        <p class="mb-0 opacity-75">Puskesmas Kecamatan Cilincing</p>
    </div>

    <div class="filter-box shadow-sm">
        <label for="filterRuangan" class="form-label fw-bold">📍 Filter Berdasarkan Ruangan:</label>
        <select id="filterRuangan" class="form-select form-select-lg">
            <option value="Semua">-- Tampilkan Semua Ruangan --</option>
        </select>
    </div>

    <div class="card p-4">
        <h5 class="fw-bold-blue mb-3">1. Ringkasan Indikator Mutu</h5>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                    <tr class="text-center">
                        <th class="text-start">Indikator Mutu</th>
                        <th>Total Observasi</th>
                    </tr>
                </thead>
                <tbody id="tabelRingkasan"></tbody>
                <tfoot class="table-light fw-bold text-center">
                    <tr>
                        <td class="text-start">Grand Total</td>
                        <td id="grandTotal">0</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="card p-4">
        <h5 class="fw-bold-blue mb-3">2. Detail Kepatuhan Kebersihan Tangan</h5>
        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center">
                <thead>
                    <tr>
                        <th class="text-start">Indikator Mutu</th>
                        <th>Handrub</th>
                        <th>Handwash</th>
                        <th>Tidak Melakukan</th>
                    </tr>
                </thead>
                <tbody id="tabelDetail"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHEu3HPY_7n3AJ9A-UaX-kz6Ouppr3x36oVGOunqZgzigTy2bCAYa83Rum7yBsA6AZHHyYO0BWe0RO/pub?output=csv';
    let dataGlobal = [];

    function init() {
        Papa.parse(url, {
            download: true,
            header: false,
            complete: function(results) {
                if (results.data.length > 1) {
                    dataGlobal = results.data.slice(1);
                    populateFilter(dataGlobal);
                    prosesData("Semua");
                }
            }
        });
    }

    // Mengambil daftar ruangan unik untuk dropdown (Kolom B / Indeks 1)
    function populateFilter(data) {
        let ruanganSet = new Set();
        data.forEach(row => {
            if(row) ruanganSet.add(row.trim());
        });

        let sortedRuangan = Array.from(ruanganSet).sort();
        sortedRuangan.forEach(r => {
            $('#filterRuangan').append(`<option value="${r}">${r}</option>`);
        });
    }

    function prosesData(ruanganTerpilih) {
        let stats = {
            "Kepatuhan Identifikasi Pasien": { total: 0, hr: 0, hw: 0, tdk: 0 },
            "Kepatuhan Kebersihan Tangan": { total: 0, hr: 0, hw: 0, tdk: 0 },
            "Kepatuhan Penggunaan APD": { total: 0, hr: 0, hw: 0, tdk: 0 }
        };

        let filteredData = dataGlobal;
        if (ruanganTerpilih !== "Semua") {
            filteredData = dataGlobal.filter(row => row === ruanganTerpilih);
        }

        filteredData.forEach(row => {
            const indikator = (row || "").trim(); // Kolom E
            const rowText = row.join(" ").toLowerCase();

            if (stats[indikator]) {
                stats[indikator].total++;
                if (rowText.includes("handrub")) stats[indikator].hr++;
                if (rowText.includes("handwash") || rowText.includes("cuci tangan")) stats[indikator].hw++;
                if (rowText.includes("tidak melakukan")) stats[indikator].tdk++;
            }
        });

        // Update Tabel Ringkasan
        let htmlRingkasan = "";
        let grandTotal = 0;
        for (let key in stats) {
            htmlRingkasan += `<tr><td>${key}</td><td class="text-center">${stats[key].total}</td></tr>`;
            grandTotal += stats[key].total;
        }
        $('#tabelRingkasan').html(htmlRingkasan);
        $('#grandTotal').text(grandTotal);

        // Update Tabel Detail
        let htmlDetail = "";
        for (let key in stats) {
            htmlDetail += `
                <tr>
                    <td class="text-start">${key}</td>
                    <td>${stats[key].hr}</td>
                    <td>${stats[key].hw}</td>
                    <td>${stats[key].tdk}</td>
                </tr>`;
        }
        $('#tabelDetail').html(htmlDetail);
    }

    // Event saat filter diubah
    $('#filterRuangan').on('change', function() {
        prosesData($(this).val());
    });

    $(document).ready(init);
</script>
</body>
</html>
