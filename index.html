<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pemantauan Mutu Puskesmas Cilincing</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 12px; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h2>Tabel Pemantauan Indikator Nasional Mutu</h2>
    <div id="table-container">Memuat data...</div>

    <script>
        // Ganti URL ini dengan URL CSV yang Anda dapatkan dari "Publish to web"
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6y_Z-FayYd3y_FmSInUunP7eYV4W5yB-lK_zL6-D6yL2B-V9e_v_r_r/pub?gid=935629840&single=true&output=csv';

        async function fetchSheet() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(','));
                
                let tableHtml = '<table><thead><tr>';
                
                // Header (Timestamp, Tanggal, Observer, dll)
                rows.forEach(header => {
                    tableHtml += `<th>${header}</th>`;
                });
                tableHtml += '</tr></thead><tbody>';

                // Isi Data
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].length < 2) continue; // Lewati baris kosong
                    tableHtml += '<tr>';
                    rows[i].forEach(cell => {
                        tableHtml += `<td>${cell}</td>`;
                    });
                    tableHtml += '</tr>';
                }
                tableHtml += '</tbody></table>';
                
                document.getElementById('table-container').innerHTML = tableHtml;
            } catch (error) {
                document.getElementById('table-container').innerHTML = 'Gagal memuat data.';
                console.error(error);
            }
        }

        fetchSheet();
    </script>
</body>
</html>
