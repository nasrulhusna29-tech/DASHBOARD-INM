<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Interaktif INM Puskesmas Cilincing</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; color: #1a1a1b; }
        .navbar { background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%) !important; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .filter-card { background-color: white; padding: 20px; }
        .stat-card { border-top: 5px solid #3498db; transition: 0.3s; }
        .chart-container { height: 300px; position: relative; }
        table.dataTable { font-size: 0.8rem; }
        .filter-label { font-weight: 600; font-size: 0.85rem; color: #555; margin-bottom: 5px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-3 py-3">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1">📊 Dashboard Interaktif INM Puskesmas Cilincing</span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        
        <div class="card filter-card mb-4">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="filter-label">Bulan & Tahun</label>
                    <input type="month" id="filter-date" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="filter-label">Pilih Ruangan</label>
                    <select id="filter-ruangan" class="form-select">
                        <option value="">Semua Ruangan</option>
                        </select>
                </div>
                <div class="col-md-3">
                    <label class="filter-label">Jenis Indikator Kepatuhan</label>
                    <select id="filter-indikator" class="form-select">
                        <option value="">Semua Indikator</option>
                        <option value="Kepatuhan Kebersihan Tangan">Kepatuhan Kebersihan Tangan</option>
                        <option value="Kepatuhan Penggunaan Alat Pelindung Diri">Kepatuhan Penggunaan APD</option>
                        <option value="Kepatuhan Identifikasi Pasien">Kepatuhan Identifikasi Pasien</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="applyFilters()">Terapkan Filter</button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-3">
                <div class="card stat-card p-3 mb-3">
                    <p class="text-muted mb-1">Observasi Terfilter</p>
                    <h2 id="total-obs" class="fw-bold">0</h2>
                </div>
                <div class="card stat-card p-3" style="border-top-color: #2ecc71;">
                    <p class="text-muted mb-1">Kepatuhan (Ya)</p>
                    <h2 id="avg-compliance" class="fw-bold text-success">0%</h2>
                </div>
            </div>
            <div class="col-lg-9">
                <div class="card p-3">
                    <h6 class="fw-bold mb-3 text-center">Analisis Kepatuhan Berdasarkan Filter (%)</h6>
                    <div class="chart-container">
                        <canvas id="complianceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-2">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 fw-bold text-primary">Rincian Data Terfilter</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table id="inmTable" class="table table-striped table-hover w-100"></table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfB8jU_z4znfSFDd83-1oPGnz_3jGHfdfeKLYJ-cm7cFc2MKImrTPXUMOWKUGCfYbzGnV8reqGGhfa/pubhtml';
        let allData = [];
        let headers = [];
        let complianceChart;
        let dataTable;

        // Fungsi membersihkan string
        const clean = (str) => str ? str.replace(/"/g, '').trim() : '';

        async function initDashboard() {
            try {
                const res = await fetch(csvUrl);
                const csvData = await res.text();
                const rows = csvData.split('\n').map(r => r.split(','));
                
                headers = rows.map(h => clean(h));
                allData = rows.slice(1).filter(r => r.length > 1);

                populateRoomFilter();
                
                // Set default filter bulan ke bulan sekarang
                const now = new Date();
                const currentMonth = now.toISOString().substring(0, 7); // YYYY-MM
                document.getElementById('filter-date').value = currentMonth;

                applyFilters(); // Jalankan kalkulasi pertama kali

            } catch (err) {
                console.error(err);
                alert('Gagal mengambil data dari Google Sheets!');
            }
        }

        // Isi Dropdown Ruangan secara dinamis
        function populateRoomFilter() {
            const rooms = [...new Set(allData.map(row => clean(row)))].sort();
            const select = document.getElementById('filter-ruangan');
            rooms.forEach(room => {
                if(room) {
                    const option = document.createElement('option');
                    option.value = room;
                    option.text = room;
                    select.add(option);
                }
            });
        }

        function applyFilters() {
            const filterDate = document.getElementById('filter-date').value; // YYYY-MM
            const filterRoom = document.getElementById('filter-ruangan').value;
            const filterIndikator = document.getElementById('filter-indikator').value;

            // Proses Filtering
            const filteredData = allData.filter(row => {
                // Kolom 0: Timestamp (format M/D/YYYY H:MM:SS)
                const timestamp = clean(row);
                if(!timestamp) return false;
                
                const dateObj = new Date(timestamp);
                const rowMonthYear = dateObj.toISOString().substring(0, 7); // YYYY-MM

                const matchDate = filterDate ? (rowMonthYear === filterDate) : true;
                const matchRoom = filterRoom ? (clean(row) === filterRoom) : true;
                const matchInd = filterIndikator ? (clean(row) === filterIndikator) : true;

                return matchDate && matchRoom && matchInd;
            });

            updateVis(filteredData);
        }

        function updateVis(data) {
            // --- HITUNG STATISTIK ---
            let totalYa = 0;
            const stats = {}; // Untuk grafik

            data.forEach(row => {
                const indikator = clean(row);
                const kepatuhan = clean(row).toLowerCase();

                if (!stats[indikator]) stats[indikator] = { ya: 0, total: 0 };
                
                if (kepatuhan === 'ya') {
                    stats[indikator].ya++;
                    totalYa++;
                }
                stats[indikator].total++;
            });

            // Update Kartu
            const totalObs = data.length;
            document.getElementById('total-obs').innerText = totalObs;
            const avg = totalObs > 0 ? ((totalYa / totalObs) * 100).toFixed(1) : 0;
            document.getElementById('avg-compliance').innerText = avg + '%';

            // --- UPDATE GRAFIK ---
            const chartLabels = Object.keys(stats);
            const chartValues = chartLabels.map(label => 
                stats[label].total > 0 ? ((stats[label].ya / stats[label].total) * 100).toFixed(1) : 0
            );

            const ctx = document.getElementById('complianceChart').getContext('2d');
            
            if (complianceChart) complianceChart.destroy(); // Hapus grafik lama

            complianceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: '% Kepatuhan',
                        data: chartValues,
                        backgroundColor: '#3498db',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 100 } }
                }
            });

            // --- UPDATE TABEL ---
            if (dataTable) dataTable.destroy(); // Hapus tabel lama
            
            $('#inmTable').empty(); // Bersihkan HTML tabel

            dataTable = $('#inmTable').DataTable({
                data: data,
                columns: headers.map(h => ({ title: h })),
                pageLength: 5,
                order: [[0, 'desc']],
                language: { search: "Cari di hasil filter:" }
            });
        }

        $(document).ready(initDashboard);
    </script>
</body>
</html>
