<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mutu - Puskesmas Cilincing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7fa; padding: 25px; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .header-title { background: #1e3c72; color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 25px; }
        .filter-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #dee2e6; }
        .table thead { background-color: #f8f9fa; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title shadow">
        <h3 class="mb-1">📊 DASHBOARD PEMANTAUAN INDIKATOR MUTU</h3>
        <p class="mb-0 opacity-75">Puskesmas Kecamatan Cilincing</p>
    </div>

    <div class="filter-box shadow-sm">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">📍 Ruangan:</label>
                <select id="filterRuangan" class="form-select">
                    <option value="Semua">Semua Ruangan</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">📅 Bulan:</label>
                <select id="filterBulan" class="form-select">
                    <option value="Semua">Semua Bulan</option>
                    <option value="0">Januari</option>
                    <option value="1">Februari</option>
                    <option value="2">Maret</option>
                    <option value="3">April</option>
                    <option value="4">Mei</option>
                    <option value="5">Juni</option>
                    <option value="6">Juli</option>
                    <option value="7">Agustus</option>
                    <option value="8">September</option>
                    <option value="9">Oktober</option>
                    <option value="10">November</option>
                    <option value="11">Desember</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">🗓️ Tahun:</label>
                <select id="filterTahun" class="form-select">
                    <option value="Semua">Semua Tahun</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <h5 class="fw-bold text-primary mb-3">1. Ringkasan Indikator Mutu</h5>
        <table class="table table-bordered align-middle text-center">
            <thead>
                <tr>
                    <th class="text-start">Indikator Mutu</th>
                    <th>Total Observasi</th>
                </tr>
            </thead>
            <tbody id="tabelRingkasan"></tbody>
            <tfoot class="table-light fw-bold">
                <tr>
                    <td class="text-start">Grand Total</td>
                    <td id="grandTotal">0</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="card p-4">
        <h5 class="fw-bold text-primary mb-3">2. Detail Kepatuhan Kebersihan Tangan</h5>
        <table class="table table-bordered align-middle text-center">
            <thead>
                <tr>
                    <th class="text-start">Indikator Mutu</th>
                    <th>Handrub</th>
                    <th>Handwash</th>
                    <th>Tidak Melakukan</th>
                </tr>
            </thead>
            <tbody id="tabelDetail"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfB8jU_z4znfSFDd83-1oPGnz_3jGHfdfeKLYJ-cm7cFc2MKImrTPXUMOWKUGCfYbzGnV8reqGGhfa/pub?gid=137717772&single=true&output=csv';
    let rawData = [];

    function init() {
        Papa.parse(url, {
            download: true,
            header: true,
            complete: function(results) {
                if (results.data.length > 0) {
                    // Membersihkan data kosong dan menambahkan properti Date
                    rawData = results.data.filter(d => d["Timestamp"]).map(d => {
                        let dateObj = new Date(d["Timestamp"]);
                        return { 
                            ...d, 
                            _month: dateObj.getMonth().toString(), 
                            _year: dateObj.getFullYear().toString() 
                        };
                    });
                    
                    setupFilters(rawData);
                    updateDashboard();
                }
            }
        });
    }

    function setupFilters(data) {
        // Setup Filter Ruangan
        let listRuangan = [...new Set(data.map(item => item["Pilih Ruangan"]).filter(Boolean))].sort();
        listRuangan.forEach(r => $('#filterRuangan').append(`<option value="${r}">${r}</option>`));

        // Setup Filter Tahun (Otomatis dari data yang ada)
        let listTahun = [...new Set(data.map(item => item._year).filter(Boolean))].sort((a,b) => b-a);
        listTahun.forEach(t => $('#filterTahun').append(`<option value="${t}">${t}</option>`));
    }

    function updateDashboard() {
        const fRuangan = $('#filterRuangan').val();
        const fBulan = $('#filterBulan').val();
        const fTahun = $('#filterTahun').val();

        let summary = {
            "Kepatuhan Identifikasi Pasien": { total: 0, hr: 0, hw: 0, tdk: 0 },
            "Kepatuhan Kebersihan Tangan": { total: 0, hr: 0, hw: 0, tdk: 0 },
            "Kepatuhan Penggunaan APD": { total: 0, hr: 0, hw: 0, tdk: 0 }
        };

        // Logika Filter Berlapis
        let filtered = rawData.filter(d => {
            let matchRuangan = (fRuangan === "Semua" || d["Pilih Ruangan"] === fRuangan);
            let matchBulan = (fBulan === "Semua" || d._month === fBulan);
            let matchTahun = (fTahun === "Semua" || d._year === fTahun);
            return matchRuangan && matchBulan && matchTahun;
        });

        filtered.forEach(row => {
            let kpi = row["Pilih Pemantauan Indikator Mutu"];
            if (summary[kpi]) {
                summary[kpi].total++;
                
                let fullRow = JSON.stringify(row).toLowerCase();
                if (fullRow.includes("handrub")) summary[kpi].hr++;
                if (fullRow.includes("handwash") || fullRow.includes("cuci tangan")) summary[kpi].hw++;
                if (fullRow.includes("tidak melakukan")) summary[kpi].tdk++;
            }
        });

        // Tampilkan Tabel 1
        let html1 = ""; let gTotal = 0;
        for (let key in summary) {
            html1 += `<tr><td class="text-start">${key}</td><td>${summary[key].total}</td></tr>`;
            gTotal += summary[key].total;
        }
        $('#tabelRingkasan').html(html1);
        $('#grandTotal').text(gTotal);

        // Tampilkan Tabel 2
        let html2 = "";
        for (let key in summary) {
            html2 += `<tr><td class="text-start">${key}</td><td>${summary[key].hr}</td><td>${summary[key].hw}</td><td>${summary[key].tdk}</td></tr>`;
        }
        $('#tabelDetail').html(html2);
    }

    // Listener untuk semua filter
    $('#filterRuangan, #filterBulan, #filterTahun').change(updateDashboard);
    
    $(document).ready(init);
</script>
</body>
</html>
