<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Monitoring INM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">
    <style>
        body { padding: 20px; background-color: #f4f7fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .table-card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 20px; margin-top: 20px; }
        .header-title { color: #1e3c72; font-weight: 700; text-align: center; margin-bottom: 20px; }
        /* Warna Header Tabel */
        table.dataTable thead th { background-color: #1e3c72 !important; color: white !important; border: none; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="table-card">
        <h3 class="header-title">📋 DATA MONITORING INM PUSKESMAS CILINCING</h3>
        
        <div id="loader" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Mengambil data dari Google Sheets...</p>
        </div>

        <div class="table-responsive">
            <table id="tabelINM" class="table table-striped table-bordered w-100" style="display:none;">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    // Link CSV dari Google Sheets Anda (Gid 137717772)
    const linkData = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfB8jU_z4znfSFDd83-1oPGnz_3jGHfdfeKLYJ-cm7cFc2MKImrTPXUMOWKUGCfYbzGnV8reqGGhfa/pub?gid=137717772&single=true&output=csv';

    function loadDataKeTabel() {
        Papa.parse(linkData, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data && results.data.length > 0) {
                    $('#loader').hide();
                    $('#tabelINM').show();

                    const judulKolom = results.data; // Baris 1
                    const isiData = results.data.slice(1); // Baris 2 dst

                    // MENGATASI ERROR "Cannot reinitialise DataTable"
                    if ($.fn.DataTable.isDataTable('#tabelINM')) {
                        $('#tabelINM').DataTable().destroy(); // Hancurkan tabel lama
                        $('#tabelINM').empty(); // Kosongkan elemen
                    }

                    // Buat Tabel Baru
                    $('#tabelINM').DataTable({
                        data: isiData,
                        columns: judulKolom.map((title, index) => ({ 
                            title: title, 
                            data: index,
                            defaultContent: "-" 
                        })),
                        pageLength: 10,
                        scrollX: true, // Scroll ke samping jika kolom banyak
                        autoWidth: false,
                        language: {
                            url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/id.json"
                        }
                    });
                } else {
                    $('#loader').html('<div class="alert alert-warning">Data tidak ditemukan. Cek kembali Google Sheets Anda.</div>');
                }
            },
            error: function() {
                $('#loader').html('<div class="alert alert-danger">Gagal menghubungi Google Sheets. Pastikan link sudah di-Publish.</div>');
