<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard INM Puskesmas Cilincing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7fa; padding: 20px; font-family: sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .chart-container { height: 350px; position: relative; }
        .header-title { color: #1e3c72; font-weight: 700; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <h3 class="header-title">📊 MONITORING KEPATUHAN KEBERSIHAN TANGAN</h3>
    
    <div id="loading-status" class="alert alert-info text-center">Menghubungkan ke Google Sheets...</div>

    <div class="row">
        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="text-center text-primary mb-3">HANDRUB (%)</h5>
                <div class="chart-container"><canvas id="chartHandrub"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="text-center text-success mb-3">HANDWASH (%)</h5>
                <div class="chart-container"><canvas id="chartHandwash"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    // Link CSV dari gambar Anda
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHEu3HPY_7n3AJ9A-UaX-kz6Ouppr3x36oVGOunqZgzigTy2bCAYa83Rum7yBsA6AZHHyYO0BWe0RO/pub?gid=0&single=true&output=csv';

    function init() {
        Papa.parse(csvUrl, {
            download: true,
            header: false,
            complete: function(results) {
                const data = results.data;
                if (data.length > 1) {
                    $('#loading-status').hide();
                    renderGrafik(data.slice(1));
                } else {
                    $('#loading-status').removeClass('alert-info').addClass('alert-danger').text('Data Kosong atau Link Salah');
                }
            },
            error: function() {
                $('#loading-status').removeClass('alert-info').addClass('alert-danger').text('Gagal Terhubung ke Google Sheets');
            }
        });
    }

    function renderGrafik(rows) {
        const labels = ["Momen 1", "Momen 2", "Momen 3", "Momen 4", "Momen 5"];
        let hrYa =, hrTot =;
        let hwYa =, hwTot =;

        rows.forEach(row => {
            const indikator = (row || "").toLowerCase(); // Kolom E
            for (let i = 0; i < 5; i++) {
                let cell = (row[5 + i] || "").toLowerCase().trim(); // Kolom F-J
                if (cell === "") continue;

                const patuh = cell.includes("ya") || cell.includes("sesuai") || cell === "5" || cell === "4";

                if (indikator.includes("handrub")) {
                    hrTot[i]++;
                    if (patuh) hrYa[i]++;
                } else if (indikator.includes("handwash") || indikator.includes("cuci tangan")) {
                    hwTot[i]++;
                    if (patuh) hwYa[i]++;
                }
            }
        });

        const pHR = hrYa.map((v, i) => hrTot[i] > 0 ? (v / hrTot[i] * 100).toFixed(1) : 0);
        const pHW = hwYa.map((v, i) => hwTot[i] > 0 ? (v / hwTotal[i] * 100).toFixed(1) : 0);

        buatChart("chartHandrub", labels, pHR, "#3498db");
        buatChart("chartHandwash", labels, pHW, "#2ecc71");
    }

    function buatChart(id, labels, data, color) {
        new Chart(document.getElementById(id), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ label: '% Kepatuhan', data: data, backgroundColor: color }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 100 } }
            }
        });
    }

    $(document).ready(init);
</script>
</body>
</html>
