<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Table INM Puskesmas Cilincing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: 'Inter', sans-serif; }
        .table-card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; }
        .header-title { color: #1e3c72; font-weight: 700; margin-bottom: 25px; text-align: center; }
        table.dataTable thead { background-color: #1e3c72; color: white; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="table-card">
        <h3 class="header-title">📋 DATA MONITORING INM PUSKESMAS CILINCING</h3>
        
        <div class="table-responsive">
            <table id="sheetTable" class="table table-striped table-hover w-100">
                </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    // Link CSV dari Google Sheets Anda
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfB8jU_z4znfSFDd83-1oPGnz_3jGHfdfeKLYJ-cm7cFc2MKImrTPXUMOWKUGCfYbzGnV8reqGGhfa/pub?gid=137717772&single=true&output=csv';

    function loadTable() {
        Papa.parse(csvUrl, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                if (!results.data || results.data.length < 1) return;

                const headers = results.data; // Baris pertama sebagai judul
                const rowData = results.data.slice(1); // Baris selanjutnya sebagai isi

                // Inisialisasi DataTable
                $('#sheetTable').DataTable({
                    data: rowData,
                    columns: headers.map((h, i) => ({ 
                        title: h, 
                        data: i,
                        defaultContent: "-" // Jika ada sel kosong diisi tanda strip
                    })),
                    pageLength: 10, // Menampilkan 10 baris per halaman
                    responsive: true,
                    order: [[0, 'desc']], // Urutkan berdasarkan kolom pertama (Timestamp) terbaru
                    language: {
                        url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/id.json" // Terjemahan Indonesia
                    }
                });
            }
        });
    }

    $(document).ready(loadTable);
</script>
</body>
</html>
