<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Monitoring Kebersihan Tangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #f4f7fa; padding: 30px; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-title { color: #1e3c72; font-weight: 700; text-align: center; margin-bottom: 25px; }
        .table thead { background-color: #1e3c72; color: white; }
        .bg-handrub { background-color: #e3f2fd; color: #0d47a1; font-weight: bold; }
        .bg-handwash { background-color: #e8f5e9; color: #1b5e20; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h3 class="header-title">📋 REKAPITULASI PENGGUNAAN FASILITAS KEBERSIHAN TANGAN</h3>

    <div id="status-box" class="alert alert-info text-center">Memuat data dari Google Sheets...</div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center mb-0">
                <thead>
                    <tr>
                        <th style="width: 50%;">Metode Kebersihan Tangan</th>
                        <th style="width: 50%;">Total Jumlah Observasi</th>
                    </tr>
                </thead>
                <tbody id="tabelData">
                    </tbody>
                <tfoot>
                    <tr class="table-secondary">
                        <th class="text-end pe-4">TOTAL KESELURUHAN</th>
                        <th id="totalSemua">0</th>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
    
    <p class="text-muted mt-3 small text-center">*Data diperbarui secara otomatis setiap kali Spreadsheet diisi.</p>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHEu3HPY_7n3AJ9A-UaX-kz6Ouppr3x36oVGOunqZgzigTy2bCAYa83Rum7yBsA6AZHHyYO0BWe0RO/pub?gid=0&single=true&output=csv';

    function muatTabel() {
        Papa.parse(csvUrl, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                if (data.length > 1) {
                    $('#status-box').hide();
                    hitungData(data.slice(1));
                } else {
                    $('#status-box').removeClass('alert-info').addClass('alert-warning').text('Data ditemukan, tetapi baris observasi masih kosong.');
                }
            },
            error: function() {
                $('#status-box').removeClass('alert-info').addClass('alert-danger').text('Gagal mengambil data. Pastikan link Google Sheets sudah di-publish ke web.');
            }
        });
    }

    function hitungData(rows) {
        let jmlHandrub = 0;
        let jmlHandwash = 0;

        rows.forEach(row => {
            // Kolom E (Indeks 4) adalah kolom Indikator/Metode
            const metode = (row || "").toLowerCase();
            
            if (metode.includes("handrub")) {
                jmlHandrub++;
            } else if (metode.includes("handwash") || metode.includes("cuci tangan")) {
                jmlHandwash++;
            }
        });

        const total = jmlHandrub + jmlHandwash;

        const html = `
            <tr>
                <td class="text-start ps-4 bg-handrub">✨ Handrub</td>
                <td class="fs-5">${jmlHandrub}</td>
            </tr>
            <tr>
                <td class="text-start ps-4 bg-handwash">🚰 Handwash (Cuci Tangan)</td>
                <td class="fs-5">${jmlHandwash}</td>
            </tr>
        `;

        $('#tabelData').html(html);
        $('#totalSemua').text(total).addClass('fs-5');
    }

    $(document).ready(muatTabel);
</script>

</body>
</html>
