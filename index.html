<div class="card p-4 shadow-sm mt-4">
    <h5 class="fw-bold mb-3"><i class="bi bi-table"></i> Ringkasan Jumlah Observasi</h5>
    <div class="table-responsive">
        <table class="table table-bordered table-hover text-center">
            <thead class="table-dark">
                <tr>
                    <th>Jenis Metode</th>
                    <th>Total Observasi (Baris Data)</th>
                    <th>Status Ketersediaan</th>
                </tr>
            </thead>
            <tbody id="tabelRingkasan">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Tambahkan logika ini di dalam fungsi prosesStatistik(data) Anda
    function updateTabelRingkasan(data) {
        let countHR = 0;
        let countHW = 0;

        data.forEach(row => {
            const indikator = (row || "").toLowerCase();
            if (indikator.includes("handrub")) {
                countHR++;
            } else if (indikator.includes("handwash") || indikator.includes("cuci tangan")) {
                countHW++;
            }
        });

        const html = `
            <tr>
                <td class="text-start ps-4">✨ Handrub</td>
                <td><strong>${countHR}</strong> kali</td>
                <td><span class="badge ${countHR > 0 ? 'bg-success' : 'bg-danger'}">${countHR > 0 ? 'Tersedia' : 'Kosong'}</span></td>
            </tr>
            <tr>
                <td class="text-start ps-4">🚰 Handwash</td>
                <td><strong>${countHW}</strong> kali</td>
                <td><span class="badge ${countHW > 0 ? 'bg-success' : 'bg-danger'}">${countHW > 0 ? 'Tersedia' : 'Kosong'}</span></td>
            </tr>
            <tr class="table-light">
                <td class="text-start ps-4 fw-bold">TOTAL SEMUA</td>
                <td class="fw-bold">${countHR + countHW}</td>
                <td>-</td>
            </tr>
        `;
        document.getElementById('tabelRingkasan').innerHTML = html;
    }

    // Panggil fungsi updateTabelRingkasan(data) tepat setelah Papa.parse selesai
</script>
