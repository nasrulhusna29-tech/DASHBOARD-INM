<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pemantauan Indikator Mutu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 25px; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .header-title { background: #1e3c72; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .table thead { background-color: #f1f3f5; color: #495057; font-weight: bold; }
        .table-footer { background-color: #e9ecef; font-weight: bold; }
        .badge-count { background-color: #1e3c72; color: white; padding: 5px 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title shadow">
        <h3 class="mb-0">📋 TABEL PEMANTAUAN INDIKATOR MUTU</h3>
    </div>

    <div class="card p-4">
        <h5 class="fw-bold mb-3">Ringkasan Indikator Mutu</h5>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                    <tr>
                        <th>Pilih Pemantauan Indikator Mutu</th>
                        <th class="text-center">Total Observasi</th>
                    </tr>
                </thead>
                <tbody id="tabelRingkasan">
                    </tbody>
                <tfoot class="table-footer">
                    <tr>
                        <td>Grand Total</td>
                        <td class="text-center" id="grandTotalAtas">0</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="card p-4">
        <h5 class="fw-bold mb-3">Detail Kepatuhan Kebersihan Tangan</h5>
        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center">
                <thead>
                    <tr>
                        <th class="text-start">Indikator Mutu</th>
                        <th>Handrub</th>
                        <th>Handwash</th>
                        <th>Tidak Melakukan</th>
                    </tr>
                </thead>
                <tbody id="tabelDetail">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHEu3HPY_7n3AJ9A-UaX-kz6Ouppr3x36oVGOunqZgzigTy2bCAYa83Rum7yBsA6AZHHyYO0BWe0RO/pub?gid=0&single=true&output=csv';

    function init() {
        Papa.parse(url, {
            download: true,
            header: false,
            complete: function(results) {
                if (results.data.length > 1) {
                    renderTable(results.data.slice(1));
                }
            }
        });
    }

    function renderTable(rows) {
        let stats = {
            "Kepatuhan Identifikasi Pasien": { total: 0, hr: 0, hw: 0, tdk: 0 },
            "Kepatuhan Kebersihan Tangan": { total: 0, hr: 0, hw: 0, tdk: 0 },
            "Kepatuhan Penggunaan APD": { total: 0, hr: 0, hw: 0, tdk: 0 }
        };

        rows.forEach(row => {
            const indikator = (row || "").trim(); // Kolom E
            const rowText = row.join(" ").toLowerCase();

            if (stats[indikator]) {
                stats[indikator].total++;
                
                // Hitung detail jika itu kebersihan tangan
                if (rowText.includes("handrub")) stats[indikator].hr++;
                if (rowText.includes("handwash") || rowText.includes("cuci tangan")) stats[indikator].hw++;
                if (rowText.includes("tidak melakukan")) stats[indikator].tdk++;
            }
        });

        // Isi Tabel Ringkasan
        let htmlAtas = "";
        let totalSemuaAtas = 0;
        for (let key in stats) {
            htmlAtas += `<tr><td>${key}</td><td class="text-center">${stats[key].total}</td></tr>`;
            totalSemuaAtas += stats[key].total;
        }
        $('#tabelRingkasan').html(htmlAtas);
        $('#grandTotalAtas').text(totalSemuaAtas);

        // Isi Tabel Detail
        let htmlBawah = "";
        for (let key in stats) {
            htmlBawah += `
                <tr>
                    <td class="text-start">${key}</td>
                    <td>${stats[key].hr}</td>
                    <td>${stats[key].hw}</td>
                    <td>${stats[key].tdk}</td>
                </tr>`;
        }
        $('#tabelDetail').html(htmlBawah);
    }

    $(document).ready(init);
</script>
</body>
</html>
