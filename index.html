<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Kebersihan Tangan - Puskesmas Cilincing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding: 40px 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .rekap-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; overflow: hidden; }
        .rekap-header { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 30px; text-align: center; }
        .table { margin-bottom: 0; }
        .table thead th { background-color: #f8f9fa; color: #333; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #dee2e6; }
        .count-number { font-size: 1.5rem; font-weight: 800; color: #1e3c72; }
        .badge-method { padding: 8px 15px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; }
        .bg-handrub { background-color: #e3f2fd; color: #0d47a1; }
        .bg-handwash { background-color: #e8f5e9; color: #1b5e20; }
    </style>
</head>
<body>

<div class="container" style="max-width: 800px;">
    <div class="rekap-card shadow">
        <div class="rekap-header">
            <h2 class="mb-1">📊 REKAPITULASI DATA</h2>
            <p class="mb-0 opacity-75">Kepatuhan Kebersihan Tangan</p>
        </div>
        
        <div id="loader" class="p-5 text-center">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">Sinkronisasi dengan Google Sheets...</p>
        </div>

        <div id="main-content" style="display: none;">
            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">
                    <thead>
                        <tr>
                            <th class="text-start ps-4">Metode yang Digunakan</th>
                            <th>Total Observasi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelBody">
                        </tbody>
                    <tfoot>
                        <tr class="table-light">
                            <td class="text-start ps-4 fw-bold">TOTAL KESELURUHAN</td>
                            <td id="totalSemua" class="fw-bold fs-4 text-dark">0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
    
    <div id="error-msg" class="alert alert-danger mt-3 text-center" style="display: none;">
        Gagal memuat data. Pastikan Spreadsheet sudah di-publish ke Web sebagai CSV.
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    // Link CSV dari Spreadsheet Anda
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHEu3HPY_7n3AJ9A-UaX-kz6Ouppr3x36oVGOunqZgzigTy2bCAYa83Rum7yBsA6AZHHyYO0BWe0RO/pub?gid=0&single=true&output=csv';

    function ambilData() {
        Papa.parse(csvUrl, {
            download: true,
            header: false,
            complete: function(results) {
                const barisData = results.data;
                if (barisData.length > 0) {
                    $('#loader').hide();
                    $('#main-content').fadeIn();
                    prosesHitung(barisData);
                }
            },
            error: function() {
                $('#loader').hide();
                $('#error-msg').show();
            }
        });
    }

    function prosesHitung(data) {
        let handrub = 0;
        let handwash = 0;

        // Mulai dari indeks 1 untuk melewati header
        for (let i = 1; i < data.length; i++) {
            // Gabungkan satu baris menjadi teks untuk pencarian keyword (lebih aman)
            let rowText = data[i].join(" ").toLowerCase();
            
            if (rowText.includes("handrub")) {
                handrub++;
            } else if (rowText.includes("handwash") || rowText.includes("cuci tangan")) {
                handwash++;
            }
        }

        const isiTabel = `
            <tr>
                <td class="text-start ps-4">
                    <span class="badge-method bg-handrub">✨ HANDRUB</span>
                </td>
                <td class="count-number">${handrub}</td>
            </tr>
            <tr>
                <td class="text-start ps-4">
                    <span class="badge-method bg-handwash">🚰 HANDWASH</span>
                </td>
                <td class="count-number">${handwash}</td>
            </tr>
        `;

        $('#tabelBody').html(isiTabel);
        $('#totalSemua').text(handrub + handwash);
    }

    $(document).ready(ambilData);
</script>
</body>
</html>
